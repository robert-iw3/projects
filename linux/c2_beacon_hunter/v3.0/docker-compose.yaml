---
services:
  c2-beacon-hunter:
    build:
      context: ..
      dockerfile: ebpf.Dockerfile
    container_name: c2-beacon-hunter-v3
    privileged: true
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - /sys/kernel/debug:/sys/kernel/debug:rw
      - /sys/fs/bpf:/sys/fs/bpf:rw
      - /sys/kernel/btf/vmlinux:/sys/kernel/btf/vmlinux:ro
      - ./output:/app/output:rw
      - ./data:/app/data:rw
      - /lib/modules:/lib/modules:ro
      - /usr/src:/usr/src:ro
      - /proc:/host/proc:ro
    environment:
      - TARGET_INTERFACE=${TARGET_INTERFACE:-wlo1}
      - MODE=${MODE:-host} # ← set to "promisc" for Epic 1
      - TEST_MODE=false
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - BPF
    command: >
      sh -c "
        cp /app/v3.0/config.ini /app/config.ini 2>/dev/null || true &&
        echo '[v3.0] Starting in $${MODE:-host} mode on $${TARGET_INTERFACE}' &&
        python3 /app/c2_beacon_hunter.py --output-dir /app/output
      "
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  api-dashboard:
    image: python:3.12-slim
    container_name: c2-api-dashboard
    ports:
      - "8443:8443"
    volumes:
      - ./api_server.py:/app/api_server.py:ro
      - ./static:/app/static:ro
      - ./certs:/app/certs:ro
      - ./data:/app/data:ro
      - ./output:/app/output:ro
    working_dir: /app
    command: >
      bash -c "pip install fastapi uvicorn requests &&
      uvicorn api_server:app --host 0.0.0.0 --port 8443
      --ssl-keyfile=/app/certs/key.pem --ssl-certfile=/app/certs/cert.pem"